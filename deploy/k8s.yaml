apiVersion: apps/v1
kind: Deployment
metadata: { name: pwnreview, labels: { app: pwnreview } }
spec:
  replicas: 1
  selector: { matchLabels: { app: pwnreview } }
  template:
    metadata: { labels: { app: pwnreview } }
    spec:
      containers:
        - name: pwnreview
          image: ghcr.io/cognis-digital/pwnreview:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: pwnreview }
spec:
  selector: { app: pwnreview }
  ports: [{ port: 80, targetPort: 8000 }]
